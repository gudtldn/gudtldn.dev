        /* Skeleton animation */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);

            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }

    </style>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('profileApp', () => ({
                data: {
                    name: "",
                    domain: "",
                    status: [],
                    location: "",
                    timezone: "UTC",
                    timezoneAbbr: "",
                    blogUrl: "",
                    bio: "",
                    socials: [],
                    customLinks: [],
                    currentlyFocusing: [],
                    techStack: { languages: [], tools: [] },
                    infrastructure: [],
                    github: { username: "", themeColor: "3b82f6" }
                },
                loaded: false,
                error: false,
                copied: false,
                currentTime: "",
                // START: GitHub Commits State
                recentCommits: [],
                commitsLoaded: false,
                commitsError: false,
                commitsVisible: [false, false, false],
                // END: GitHub Commits State
                async init() {
                    try {
                        const response = await fetch('./profile.json');
                        if (response.ok) {
                            this.data = await response.json();
                            this.updateMeta();
                            this.initTime(); // Load time after data is ready
                            this.fetchRecentCommits(); // START/END: GitHub Commits Fetch
                        } else {
                            throw new Error("profile.json 로드 실패");
                        }
                    } catch (e) {
                        console.error("데이터를 불러오는 중 문제가 발생했습니다:", e);
                        this.error = true;
                        document.title = "Error | Profile";
                    } finally {
                        setTimeout(() => this.loaded = true, 300);
                    }
                },
                updateMeta() {
                    const title = `${this.data.name} | ${this.data.domain}`;
                    const description = this.data.bio.replace(/<[^>]*>?/gm, '').substring(0, 160);
                    
                    document.title = title;
                    
                    // Update Meta Tags
                    const metaMap = {
                        'description': description,
                        'og:title': title,
                        'og:description': description
                    };

                    Object.entries(metaMap).forEach(([name, content]) => {
                        let el = document.querySelector(`meta[name="${name}"]`) || 
                                 document.querySelector(`meta[property="${name}"]`);
                        if (el) el.setAttribute('content', content);
                    });
                },
                async copyDiscord(id) {
                    if (!id) return;
                    try {
                        await navigator.clipboard.writeText(id);
                        this.copied = true;
                        setTimeout(() => this.copied = false, 2000);
                    } catch (err) {
                        console.error('Failed to copy text: ', err);
                        // Fallback
                        const el = document.createElement('textarea');
                        el.value = id;
                        document.body.appendChild(el);
                        el.select();
                        document.execCommand('copy');
                        document.body.removeChild(el);
                        this.copied = true;
                        setTimeout(() => this.copied = false, 2000);
                    }
                },
                // START: GitHub Commits Methods
                async fetchRecentCommits() {
                    const username = this.data.github.username;
                    if (!username) return;
                    const CACHE_KEY = `gh_commits_${username}`;
                    const CACHE_TTL = 5 * 60 * 1000; // 5분
                    // 캐시 확인
                    try {
                        const cached = sessionStorage.getItem(CACHE_KEY);
                        if (cached) {
                            const { data, timestamp } = JSON.parse(cached);
                            if (Date.now() - timestamp < CACHE_TTL) {
                                this.recentCommits = data;
                                this.commitsLoaded = true;
                                if (data.length > 0) this._startCascadingDrop();
                                return;
                            }
                        }
                    } catch (e) { /* sessionStorage 접근 불가 시 무시 */ }
                    // API 호출: Events → head SHA → Commits API 병렬 호출로 메시지 취득
                    try {
                        const res = await fetch(`https://api.github.com/users/${username}/events/public`);
                        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
                        const events = await res.json();
                        // PushEvent만 최대 3개 추출 (head SHA + repo + date 보존)
                        const pushCandidates = [];
                        for (const event of events) {
                            if (pushCandidates.length >= 3) break;
                            if (event.type !== 'PushEvent') continue;
                            if (!event.payload.head) continue;
                            pushCandidates.push({
                                sha: event.payload.head,
                                repo: event.repo.name,
                                date: event.created_at,
                                ref: event.payload.ref || ''
                            });
                        }
                        // 각 PushEvent의 head SHA로 커밋 메시지 병렬 취득
                        const commitDetails = await Promise.all(
                            pushCandidates.map(async (p) => {
                                try {
                                    const r = await fetch(`https://api.github.com/repos/${p.repo}/commits/${p.sha}`);
                                    if (!r.ok) return null;
                                    const data = await r.json();
                                    const message = (data.commit?.message || '').split('\n')[0];
                                    return {
                                        sha: p.sha.substring(0, 7),
                                        message: message || p.ref.replace('refs/heads/', ''),
                                        repo: p.repo,
                                        url: `https://github.com/${p.repo}/commit/${p.sha}`,
                                        date: p.date
                                    };
                                } catch (e) { return null; }
                            })
                        );
                        const commits = commitDetails.filter(Boolean);
                        this.recentCommits = commits;
                        // 빈 결과는 캐시하지 않음 (일시적 오류/빈 피드 구분)
                        if (commits.length > 0) {
                            try {
                                sessionStorage.setItem(CACHE_KEY, JSON.stringify({ data: commits, timestamp: Date.now() }));
                            } catch (e) { /* 저장 실패 시 무시 */ }
                        }
                    } catch (e) {
                        console.error('GitHub commits fetch failed:', e);
                        this.commitsError = true;
                    } finally {
                        this.commitsLoaded = true;
                        if (this.recentCommits.length > 0) this._startCascadingDrop();
                    }
                },
                _startCascadingDrop() {
                    this.commitsVisible = [false, false, false];
                    setTimeout(() => { this.commitsVisible = [true, false, false]; }, 0);
                    setTimeout(() => { this.commitsVisible = [true, true, false]; }, 120);
                    setTimeout(() => { this.commitsVisible = [true, true, true]; }, 240);
                },
                commitCardStyle(index) {
                    const opacities = [1, 0.65, 0.38];
                    const delays = [0, 120, 240];
                    const visible = this.commitsVisible[index] || false;
                    return {
                        opacity: visible ? (opacities[index] ?? 1) : 0,
                        transform: `translateY(${visible ? 0 : -20}px)`,
                        transition: `opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1) ${delays[index]}ms, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1) ${delays[index]}ms`,
                        marginLeft: `${index * 20}px`,
                        maxWidth: `calc(100% - ${index * 20}px)`
                    };
                },
                relativeTime(dateStr) {
                    if (!dateStr) return '';
                    const diff = Date.now() - new Date(dateStr).getTime();
                    const m = Math.floor(diff / 60000);
                    const h = Math.floor(diff / 3600000);
                    const d = Math.floor(diff / 86400000);
                    if (m < 1) return '방금 전';
                    if (m < 60) return `${m}분 전`;
                    if (h < 24) return `${h}시간 전`;
                    if (d < 30) return `${d}일 전`;
                    return `${Math.floor(d / 30)}달 전`;
                },
                // END: GitHub Commits Methods
>>>>>>> 8761e6d (feat: 최근 커밋 기록 카드 기능 추가)
                initTime() {
                    const update = () => {
                        const now = new Date();
                        try {
                            const timeString = new Intl.DateTimeFormat('en-US', {
                                timeZone: this.data.timezone || 'Asia/Seoul',
                                hour12: false,
                                hour: '2-digit',
                                minute: '2-digit',
                                second: '2-digit'
                            }).format(now);
                            this.currentTime = `${timeString} ${this.data.timezoneAbbr || ''}`;
                        } catch (e) {
                            this.currentTime = now.toLocaleTimeString();
                        }
                    };
                    update();
                    setInterval(update, 1000);
                }
            }));
        });
    </script>

            <div class="h-24 skeleton rounded-2xl"></div>
            <div class="h-24 skeleton rounded-2xl"></div>
        </div>

                                <a :href="lang.url" target="_blank" rel="noopener noreferrer" class="flex flex-col items-center gap-2 group cursor-pointer active:scale-90 transition-transform">
                                    <img :src="`https://skillicons.dev/icons?i=${lang.logo}`" :alt="lang.name" class="h-10 w-10 md:h-12 md:w-12 transition-all duration-300 group-hover:scale-110 group-hover:-translate-y-1">
                                    <span class="text-[10px] font-bold text-slate-400 group-hover:text-blue-500 transition-colors" x-text="lang.name"></span>
                                </a>
                            </template>
                        </div>
                    </div>
                    <div class="space-y-6" x-show="data.techStack.tools.length > 0">
                        <h3 class="text-[11px] font-semibold text-slate-400 mb-4 uppercase flex items-center gap-2">
                            <span class="w-1 h-3 bg-slate-700 rounded-full"></span>
                            Tools & Engines
                        </h3>
                        <div class="flex flex-wrap gap-x-6 gap-y-6">
                            <template x-for="tool in data.techStack.tools" :key="tool.name">
                                <a :href="tool.url" target="_blank" rel="noopener noreferrer" class="flex flex-col items-center gap-2 group cursor-pointer active:scale-90 transition-transform">
                                    <img :src="`https://skillicons.dev/icons?i=${tool.logo}`" :alt="tool.name" class="h-10 w-10 md:h-12 md:w-12 transition-all duration-300 group-hover:scale-110 group-hover:-translate-y-1">
                                    <span class="text-[10px] font-bold text-slate-400 group-hover:text-blue-500 transition-colors" x-text="tool.name"></span>
                                </a>
                            </template>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Infrastructure -->
            <section x-show="data.infrastructure && data.infrastructure.length > 0">
                <h2 class="text-[11px] font-semibold uppercase tracking-[0.2em] text-slate-400 mb-6">Infrastructure</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <template x-for="infra in data.infrastructure" :key="infra.name">
                        <a :href="infra.url" target="_blank" rel="noopener noreferrer" class="group flex items-center justify-between p-5 glass rounded-2xl touch-active transition-all hover:bg-white/5">
                            <div class="flex items-center gap-4">
                                <div :class="`w-12 h-12 rounded-xl flex items-center justify-center bg-${infra.theme}-500/10 text-${infra.theme}-500`">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                                </div>
                                <div>
                                    <span class="block font-medium text-base" x-text="infra.name"></span>
                                    <span class="text-xs text-slate-400" x-text="infra.description"></span>
                                </div>
                            </div>
                            <svg class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-all transform translate-x-[-10px] group-hover:translate-x-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </a>
                    </template>
                </div>
            </section>

            <!-- Activity & Stats -->
            <section x-show="data.github.username" class="pt-12 border-t border-slate-800">
                <h2 class="text-[11px] font-semibold uppercase tracking-[0.2em] text-slate-400 mb-10 text-center">Activity & Performance</h2>
                
                <div class="flex flex-col gap-10">
                    <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                        <div class="w-full md:w-auto flex justify-center">
                            <img :src="`https://github-readme-stats-gudtldn.vercel.app/api?username=${data.github.username}&bg_color=00000000&hide_border=true&show_icons=true&include_all_commits=true&count_private=true&text_color=7e8c9a&icon_color=${data.github.themeColor}&title_color=ffffff&card_width=380`" alt="GitHub Stats" class="max-w-full">
                        </div>
                        <div class="w-full md:w-auto flex justify-center">
                            <img :src="`https://github-readme-stats-gudtldn.vercel.app/api/top-langs?username=${data.github.username}&bg_color=00000000&hide_border=true&langs_count=6&exclude_repo=${data.github.username}.github.io,github-readme-stats,gudtldn.dev&layout=compact&text_color=7e8c9a&icon_color=${data.github.themeColor}&title_color=ffffff&card_width=320`" alt="Top Languages" class="max-w-full">
                        </div>
                    </div>

                    <div class="w-full flex flex-col items-center gap-4">
                        <h3 class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest">Commit Contribution</h3>
                        <div class="w-full max-w-2xl overflow-x-auto pb-4 scrollbar-hide">
                            <div class="min-w-[600px] md:min-w-0">
                                <img :src="`https://ghchart.rshah.org/${data.github.themeColor}/${data.github.username}`" alt="GitHub Contributions Chart" class="w-full opacity-90">
                            </div>
                        </div>
                    </div>

                    <!-- START: GitHub Recent Commits Feed -->
                    <div class="w-full">
                        <!-- 스켈레톤 로딩 -->
                        <div x-show="data.github.username && !commitsLoaded" class="w-full flex flex-col gap-3">
                            <div class="flex items-center gap-3">
                                <div class="h-2.5 w-28 skeleton rounded-full"></div>
                                <div class="flex-1 h-px bg-slate-800/60"></div>
                                <div class="h-2.5 w-8 skeleton rounded-full"></div>
                            </div>
                            <template x-for="i in [0, 1, 2]" :key="i">
                                <div :style="`margin-left: ${i * 20}px; max-width: calc(100% - ${i * 20}px);`">
                                    <div class="p-4 glass rounded-xl">
                                        <div class="flex items-center gap-3">
                                            <div class="w-1.5 h-1.5 rounded-full skeleton shrink-0"></div>
                                            <div class="flex-1 space-y-2">
                                                <div class="h-3 skeleton rounded-md" :style="`width: ${90 - i * 15}%;`"></div>
                                                <div class="h-2.5 w-40 skeleton rounded-md"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- 커밋 카드 (데이터 있을 때만 표시) -->
                        <div x-show="commitsLoaded && recentCommits.length > 0" class="w-full flex flex-col gap-3">
                            <!-- 섹션 헤더 -->
                            <div class="flex items-center gap-3">
                                <h3 class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest shrink-0">Recent Commits</h3>
                                <div class="flex-1 h-px bg-slate-800"></div>
                            </div>
                            <!-- 커밋 카드 목록 -->
                            <template x-for="(commit, index) in recentCommits" :key="commit.sha">
                                <div :style="commitCardStyle(index)">
                                    <a :href="commit.url" target="_blank" rel="noopener noreferrer"
                                       class="group flex items-start gap-3 p-4 glass rounded-xl hover:bg-white/5 transition-colors touch-active">
                                        <span class="mt-[5px] w-1.5 h-1.5 rounded-full bg-emerald-500 shrink-0"
                                              :style="`opacity: ${[1, 0.7, 0.4][index]};`"></span>
                                        <div class="flex-1 min-w-0">
                                            <p class="text-sm font-medium text-slate-200 truncate group-hover:text-blue-400 transition-colors"
                                               x-text="commit.message"></p>
                                            <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                                                <span class="text-[11px] text-slate-500 font-medium"
                                                      x-text="commit.repo.split('/')[1] || commit.repo"></span>
                                                <span class="text-slate-700 text-xs">·</span>
                                                <code class="font-mono text-[11px] text-slate-600 bg-slate-800/50 px-1.5 py-0.5 rounded"
                                                      x-text="commit.sha"></code>
                                                <span class="text-slate-700 text-xs">·</span>
                                                <span class="text-[11px] text-slate-500"
                                                      x-text="relativeTime(commit.date)"></span>
                                            </div>
                                        </div>
                                        <svg class="w-3.5 h-3.5 text-slate-700 group-hover:text-blue-400 transition-colors shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                    </a>
                                </div>
                            </template>
                        </div>
                    </div>
                    <!-- END: GitHub Recent Commits Feed -->
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="mt-24 pb-12 text-center">
            <div class="inline-flex items-center gap-2 mb-6 px-4 py-2 glass rounded-2xl shadow-sm">
                 <img :src="`https://komarev.com/ghpvc/?username=${data.github.username}&label=Page%20Views&color=blue&style=flat-square`" alt="Page Views" class="h-4">
            </div>
            <p class="text-[10px] text-slate-500 font-medium tracking-[0.2em] uppercase">
                &copy; <span x-text="new Date().getFullYear()"></span> <span x-text="data.name"></span> • <span x-text="data.domain"></span>
            </p>
        </footer>
    </div>

</body>
</html>
